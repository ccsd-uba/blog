{% extends "base.html" %}

{% block content %}
<article class="standalone-page">
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock %}
