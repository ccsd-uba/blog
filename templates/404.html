{% extends "base.html" %}

{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">{{ trans(key="page_not_found", lang=lang) }}</h1>
  <p class="error-message">{{ trans(key="page_not_found_msg", lang=lang) }}</p>
  <a href="{% if lang == config.default_language %}/{% else %}/{{ lang }}/{% endif %}" class="btn-primary">{{ trans(key="back_to_home", lang=lang) }}</a>
</div>
{% endblock %}
