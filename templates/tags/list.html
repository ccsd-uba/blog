{% extends "base.html" %}

{% block content %}
<div class="tags-page">
  <header class="page-header">
    <h1 class="page-title">Tags</h1>
    <p class="page-description">{{ trans(key="all_topics", lang=lang) }}</p>
  </header>

  <div class="tags-cloud">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="tag-item">
      {{ term.name }}
      <span class="tag-count">{{ term.pages | length }}</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
