base_url = "https://ccsd.uba.ar/"
title = "Centro de Criptografía y Sistemas Distribuidos - UBA"
description = "Centro de Criptografía y Sistemas Distribuidos."
default_language = "es"
author = "Bren"
compile_sass = false
minify_html = false
generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true


[search]
include_title = true
include_description = true
include_path = true
include_content = true

[[taxonomies]]
name = "tags"
url = "tags"
feed = true

[extra]
# Nombre del blog
blog_name = "Centro de Criptografía y Sistemas Distribuidos"
blog_tagline = "Artículos sobre criptografía, sistemas distribuidos. Publicaciones de investigación, tutoriales y noticias del Centro."

# Redes sociales (opcional, dejar vacío para no mostrar)
github = ""
twitter = ""
linkedin = ""

# Número de posts por página en el índice
posts_per_page = 10

# Mostrar tiempo de lectura estimado
show_reading_time = true
