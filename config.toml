base_url = "https://mi-blog.com"
title = "Dev Blog"
description = "Un blog técnico sobre programación, sistemas y tecnología."
default_language = "es"
author = "Bren"
compile_sass = false
minify_html = false
generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true


[search]
include_title = true
include_description = true
include_path = true
include_content = true

[[taxonomies]]
name = "tags"
url = "tags"
feed = true

[extra]
# Nombre del blog
blog_name = "Dev Blog"
blog_tagline = "Artículos sobre programación, sistemas y tecnología"

# Redes sociales (opcional, dejar vacío para no mostrar)
github = "tu-usuario"
twitter = ""
linkedin = ""

# Número de posts por página en el índice
posts_per_page = 10

# Mostrar tiempo de lectura estimado
show_reading_time = true
